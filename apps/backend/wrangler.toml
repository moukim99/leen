name = "leen-backend"
main = "src/index.ts"
compatibility_date = "2024-05-29"

[vars]
ENVIRONMENT = "development"

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "leen-db"
database_id = "local-leen-db"

# Cloudflare R2 Storage Binding
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "leen-storage"
